# Oracle wait-events lab — zero-login, runs on Oracle Database Free (currently 26ai).
# Companion to the post "Oracle Wait Events, Decoded". Each drill induces one wait event and reads
# its signature straight from v$session_event — no Diagnostics Pack required (the wait interface is
# always on, unlike AWR).
services:
  oracle:
    # Regular image (NOT -slim): we need the full DB and a real buffer cache for the I/O drills.
    image: gvenzl/oracle-free:latest
    container_name: ora-wait-events-lab
    environment:
      ORACLE_PASSWORD: Lab_Passw0rd1
      APP_USER: labuser
      APP_USER_PASSWORD: Lab_Passw0rd1
    ports:
      - "${LAB_PORT:-1521}:1521"
    volumes:
      - ora-wait-events-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 30s

volumes:
  ora-wait-events-data:
