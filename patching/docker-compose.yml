# Oracle patching-inspection lab — zero-login, runs on Oracle Database Free (currently 26ai).
# READ-ONLY: inspects your patch level, binary inventory, and the SQL-patch registry. It does NOT
# download or apply any Oracle patch — real Release Updates require a My Oracle Support account and a
# licensed Enterprise Edition to apply in production. Companion to the post
# "Oracle Patching, Demystified: CPU, RU, RUR — and What Changed in 2026".
services:
  oracle:
    # Regular image (NOT -slim): we need the full DB home (OPatch, datapatch) present.
    image: gvenzl/oracle-free:latest
    container_name: ora-patching-lab
    environment:
      ORACLE_PASSWORD: Lab_Passw0rd1
      APP_USER: labuser
      APP_USER_PASSWORD: Lab_Passw0rd1
    ports:
      - "${LAB_PORT:-1521}:1521"
    volumes:
      - ora-patching-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 30s

volumes:
  ora-patching-data:
